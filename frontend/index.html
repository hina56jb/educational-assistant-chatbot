<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥗 Diet Chatbot</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #f0f4f8;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin-top: 20px;
    color: #333;
    text-align: center;
  }

  #chat-container {
    width: 90%;
    max-width: 500px;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chatbox {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    height: 400px;
  }

  .message {
    margin-bottom: 15px;
    line-height: 1.6;
  }

  .user {
    text-align: right;
  }

  .user .bubble {
    display: inline-block;
    background: #4f9cff;
    color: #fff;
    padding: 10px 15px;
    border-radius: 15px 15px 0 15px;
    max-width: 80%;
    word-wrap: break-word;
  }

  .bot {
    text-align: left;
  }

  .bot .bubble {
    display: inline-block;
    background: #e0f7ea;
    color: #333;
    padding: 12px 15px;
    border-radius: 15px 15px 15px 0;
    max-width: 100%;
    word-wrap: break-word;
  }

  .bot b {
    display: block;
    margin-bottom: 5px;
  }

  ul {
    padding-left: 20px;
    margin: 0 0 10px 0;
  }

  li {
    margin-bottom: 5px;
  }

  #input-container {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: #f9f9f9;
  }

  #userInput {
    flex: 1;
    padding: 10px 15px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
  }

  #sendBtn {
    padding: 10px 20px;
    margin-left: 10px;
    background: #4f9cff;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  #sendBtn:hover { background: #3578e5; }
</style>
</head>
<body>

<h1>🥗 Diet Recommendation Chatbot</h1>

<div id="chat-container">
  <div id="chatbox"></div>
  <div id="input-container">
    <input type="text" id="userInput" placeholder="Ask about diet...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const chatbox = document.getElementById("chatbox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

sendBtn.addEventListener("click", sendMessage);
input.addEventListener("keydown", (e) => { if(e.key === "Enter") sendMessage(); });

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  // User bubble
  chatbox.innerHTML += `<div class="message user"><div class="bubble"><b>You:</b><br>${message}</div></div>`;
  chatbox.scrollTop = chatbox.scrollHeight;
  input.value = "";

  try {
    const response = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    // Format bot response with proper line breaks and lists
    const lines = data.reply.split("<br>");
    let formatted = "";
    let currentList = [];

    lines.forEach(line => {
      line = line.trim();
      if(line.startsWith("- ")) {
        currentList.push(line.slice(2));
      } else {
        if(currentList.length > 0) {
          formatted += "<ul>" + currentList.map(item => `<li>${item}</li>`).join("") + "</ul>";
          currentList = [];
        }
        formatted += `<b>${line}</b><br>`;
      }
    });
    if(currentList.length > 0) {
      formatted += "<ul>" + currentList.map(item => `<li>${item}</li>`).join("") + "</ul>";
    }

    chatbox.innerHTML += `<div class="message bot"><div class="bubble">${formatted}</div></div>`;
    chatbox.scrollTop = chatbox.scrollHeight;

  } catch(err) {
    chatbox.innerHTML += `<div class="message bot"><div class="bubble">AI service unavailable.</div></div>`;
    chatbox.scrollTop = chatbox.scrollHeight;
  }
}
</script>

</body>
</html>
