<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot</title>

<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* Main container */

#app{
width:90%;
max-width:800px;
height:85vh;
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
overflow:hidden;
}

/* Header */

.header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

/* Messages */

#messages{
flex:1;
padding:20px;
overflow-y:auto;
background:#f6f7fb;
}

/* Chat bubble */

.msg{
max-width:80%;
padding:12px 16px;
margin-bottom:15px;
border-radius:10px;
line-height:1.6;
animation:fade .3s ease;
}

/* user */

.user{
background:#4c6ef5;
color:white;
margin-left:auto;
}

/* bot */

.bot{
background:white;
border:1px solid #ddd;
}

/* Input area */

#input-area{
display:flex;
padding:15px;
border-top:1px solid #ddd;
gap:10px;
background:white;
}

#userInput{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
outline:none;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#4c6ef5;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#364fc7;
}

/* animation */

@keyframes fade{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

pre{
background:#111;
color:#0f0;
padding:10px;
border-radius:6px;
overflow:auto;
}

code{
font-family:monospace;
}

</style>
</head>

<body>

<div id="app">

<div class="header">
AI Assistant
</div>

<div id="messages"></div>

<div id="input-area">
<input id="userInput" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

/* Enter key send */

input.addEventListener("keypress", function(e){
if(e.key==="Enter") sendMessage();
});

/* send message */

async function sendMessage(){

const text = input.value.trim();
if(!text) return;

appendMessage(text,"user");
input.value="";

const loading = appendMessage("Thinking...","bot");

try{

const response = await fetch("https://educational-assistant-chatbot-2qq4.vercel.app/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

const data = await response.json();

loading.remove();

appendMarkdown(data.reply,"bot");

}catch(err){

loading.remove();
appendMessage("Server error.","bot");

}

}

/* normal message */

function appendMessage(text,type){

const div=document.createElement("div");

div.className="msg "+type;
div.textContent=text;

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;

return div;
}

/* markdown message */

function appendMarkdown(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.innerHTML=marked.parse(text);

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>
</html>
